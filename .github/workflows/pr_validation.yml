name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint, Test, and Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Code Generation Check
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Dependency Audit
        run: flutter pub outdated

      - name: Analyze Code
        run: flutter analyze

      - name: Run Unit Tests
        run: flutter test
